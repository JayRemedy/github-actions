name: Reusable remote log report

on:
  workflow_call:
    inputs:
      remote_target_dir:
        description: Optional remote base directory. When set, log_roots are resolved from this directory.
        required: false
        type: string
        default: ""
      log_roots:
        description: Newline-separated remote paths to search for logs. Relative paths are resolved from remote_target_dir when set.
        required: false
        type: string
        default: "."
      log_name_patterns:
        description: Newline-separated file name patterns to include.
        required: false
        type: string
        default: |
          error_log
          *.log
      max_depth:
        description: Maximum find depth under each log root.
        required: false
        type: number
        default: 6
      max_files:
        description: Maximum number of newest matching log files to include.
        required: false
        type: number
        default: 20
      tail_lines:
        description: Number of trailing lines to collect from each matching log file.
        required: false
        type: number
        default: 200
      max_bytes_per_file:
        description: Maximum bytes retained from each tailed log excerpt.
        required: false
        type: number
        default: 131072
      ssh_port:
        description: SSH port.
        required: false
        type: string
        default: "22"
      report_label:
        description: Optional caller-provided target/environment label for the report summary.
        required: false
        type: string
        default: ""
      toolkit_repository:
        description: Shared toolkit repository containing scripts.
        required: false
        type: string
        default: "JayRemedy/github-actions"
      toolkit_ref:
        description: Shared toolkit repository ref to check out.
        required: false
        type: string
        default: "main"
      artifact_retention_days:
        description: Number of days to retain redacted log report artifacts.
        required: false
        type: number
        default: 7
    secrets:
      ssh_private_key:
        description: SSH private key with read access to the requested log paths.
        required: true
      known_hosts:
        description: Known hosts content for strict host verification.
        required: true
      remote_host:
        description: Remote host.
        required: true
      remote_user:
        description: Remote user.
        required: true
      remote_target_dir:
        description: Optional remote base directory supplied as a secret by the caller repository.
        required: false
      ssh_port:
        description: Optional SSH port supplied as a secret by the caller repository.
        required: false

permissions:
  contents: read

jobs:
  report:
    name: Remote log report
    runs-on: ubuntu-latest
    steps:
      - name: Check out shared workflow toolkit
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.toolkit_repository }}
          ref: ${{ inputs.toolkit_ref }}
          path: toolkit

      - name: Prepare log report inputs
        id: inputs
        shell: bash
        env:
          INPUT_REMOTE_TARGET_DIR: ${{ inputs.remote_target_dir }}
          SECRET_REMOTE_TARGET_DIR: ${{ secrets.remote_target_dir }}
          INPUT_SSH_PORT: ${{ inputs.ssh_port }}
          SECRET_SSH_PORT: ${{ secrets.ssh_port }}
          LOG_ROOTS: ${{ inputs.log_roots }}
          LOG_NAME_PATTERNS: ${{ inputs.log_name_patterns }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/remote-log-report" "remote-log-artifacts"

          remote_target_dir="${INPUT_REMOTE_TARGET_DIR:-${SECRET_REMOTE_TARGET_DIR:-}}"
          echo "remote_target_dir=${remote_target_dir}" >> "${GITHUB_OUTPUT}"

          ssh_port="${SECRET_SSH_PORT:-${INPUT_SSH_PORT:-22}}"
          echo "ssh_port=${ssh_port}" >> "${GITHUB_OUTPUT}"

          roots_file="${RUNNER_TEMP}/remote-log-report/log-roots.txt"
          patterns_file="${RUNNER_TEMP}/remote-log-report/log-patterns.txt"
          printf '%s\n' "${LOG_ROOTS}" | sed '/^[[:space:]]*$/d' > "${roots_file}"
          printf '%s\n' "${LOG_NAME_PATTERNS}" | sed '/^[[:space:]]*$/d' > "${patterns_file}"

          if [[ ! -s "${roots_file}" ]]; then
            echo "At least one log root is required." >&2
            exit 1
          fi
          if [[ ! -s "${patterns_file}" ]]; then
            echo "At least one log name pattern is required." >&2
            exit 1
          fi

          echo "roots_file=${roots_file}" >> "${GITHUB_OUTPUT}"
          echo "patterns_file=${patterns_file}" >> "${GITHUB_OUTPUT}"

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
          KNOWN_HOSTS: ${{ secrets.known_hosts }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/log_report_key
          chmod 600 ~/.ssh/log_report_key
          printf '%s\n' "${KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Collect remote log excerpts
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.remote_host }}
          REMOTE_USER: ${{ secrets.remote_user }}
          REMOTE_TARGET_DIR: ${{ steps.inputs.outputs.remote_target_dir }}
          SSH_PORT: ${{ steps.inputs.outputs.ssh_port }}
          ROOTS_FILE: ${{ steps.inputs.outputs.roots_file }}
          PATTERNS_FILE: ${{ steps.inputs.outputs.patterns_file }}
          MAX_DEPTH: ${{ inputs.max_depth }}
          MAX_FILES: ${{ inputs.max_files }}
          TAIL_LINES: ${{ inputs.tail_lines }}
          MAX_BYTES_PER_FILE: ${{ inputs.max_bytes_per_file }}
        run: |
          set -euo pipefail

          ssh_cmd=(
            ssh
            -i ~/.ssh/log_report_key
            -p "${SSH_PORT}"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )

          remote_script="${RUNNER_TEMP}/remote-log-report/collect-remote-logs.sh"
          cat > "${remote_script}" <<'REMOTE_SCRIPT'
          set -euo pipefail

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT
          roots_file="$work_dir/roots.txt"
          patterns_file="$work_dir/patterns.txt"

          cat > "$roots_file" <<'REMOTE_LOG_ROOTS'
          __ROOTS_PLACEHOLDER__
          REMOTE_LOG_ROOTS

          cat > "$patterns_file" <<'REMOTE_LOG_PATTERNS'
          __PATTERNS_PLACEHOLDER__
          REMOTE_LOG_PATTERNS

          if [ -n "${REMOTE_TARGET_DIR}" ]; then
            cd "${REMOTE_TARGET_DIR}"
          fi

          candidates="$work_dir/candidates.txt"
          : > "$candidates"

          while IFS= read -r root || [ -n "$root" ]; do
            [ -n "$root" ] || continue
            [ -e "$root" ] || continue
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              [ -n "$pattern" ] || continue
              find "$root" -maxdepth "${MAX_DEPTH}" -type f -name "$pattern" -printf '%T@\t%p\n' 2>/dev/null || true
            done < "$patterns_file"
          done < "$roots_file" >> "$candidates"

          sort -rn "$candidates" | awk -F '\t' '!seen[$2]++ {print}' | head -n "${MAX_FILES}" | while IFS=$'\t' read -r _mtime file; do
            [ -n "$file" ] || continue
            printf '__REMOTE_LOG_FILE_START__\t%s\n' "$file"
            size="$(wc -c < "$file" 2>/dev/null | tr -d ' ' || printf 'unknown')"
            modified="$(date -r "$file" -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || printf 'unknown')"
            printf '__REMOTE_LOG_META__\tsize_bytes\t%s\n' "$size"
            printf '__REMOTE_LOG_META__\tmodified_utc\t%s\n' "$modified"
            tail -n "${TAIL_LINES}" "$file" 2>/dev/null | head -c "${MAX_BYTES_PER_FILE}" || true
            printf '\n__REMOTE_LOG_FILE_END__\n'
          done
          REMOTE_SCRIPT

          python3 - "${remote_script}" "${ROOTS_FILE}" "${PATTERNS_FILE}" <<'PY'
          from pathlib import Path
          import sys
          script = Path(sys.argv[1])
          roots = Path(sys.argv[2]).read_text().rstrip('\n')
          patterns = Path(sys.argv[3]).read_text().rstrip('\n')
          text = script.read_text()
          text = text.replace('__ROOTS_PLACEHOLDER__', roots)
          text = text.replace('__PATTERNS_PLACEHOLDER__', patterns)
          script.write_text(text)
          PY

          remote_command="$(printf 'REMOTE_TARGET_DIR=%q MAX_DEPTH=%q MAX_FILES=%q TAIL_LINES=%q MAX_BYTES_PER_FILE=%q bash -s' \
            "${REMOTE_TARGET_DIR}" "${MAX_DEPTH}" "${MAX_FILES}" "${TAIL_LINES}" "${MAX_BYTES_PER_FILE}")"

          "${ssh_cmd[@]}" "${REMOTE_USER}@${REMOTE_HOST}" "${remote_command}" \
            < "${remote_script}" > "${RUNNER_TEMP}/remote-log-report/raw.log"

      - name: Generate redacted log report
        shell: bash
        env:
          REPORT_LABEL: ${{ inputs.report_label }}
        run: |
          set -euo pipefail
          python3 toolkit/scripts/remote_log_report.py \
            --raw-log "${RUNNER_TEMP}/remote-log-report/raw.log" \
            --output-dir remote-log-artifacts \
            --report-label "${REPORT_LABEL}"

      - name: Write remote log step summary
        shell: bash
        run: |
          set -euo pipefail
          {
            grep -E '^(# |Generated:|Files included:|No matching log files|## `|- modified_utc:|- size_bytes:)' remote-log-artifacts/remote-log-report.md || true
            echo ""
            echo "Artifacts uploaded: \`remote-log-report.md\` and \`remote-log-summary.json\`."
            echo "Raw excerpts are redacted and kept in artifacts, not printed fully in this step summary."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload redacted log report artifacts
        uses: actions/upload-artifact@v6
        with:
          name: remote-log-report
          path: |
            remote-log-artifacts/remote-log-report.md
            remote-log-artifacts/remote-log-summary.json
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
