name: Reusable rsync deploy

on:
  workflow_call:
    inputs:
      source_path:
        description: Repo-relative source path to deploy.
        required: false
        type: string
        default: "."
      remote_target_dir:
        description: Optional remote target directory supplied by the caller.
        required: false
        type: string
        default: ""
      ssh_port:
        description: SSH port.
        required: false
        type: string
        default: "22"
      exclude_file:
        description: Optional caller repository file containing rsync exclude patterns.
        required: false
        type: string
        default: ""
      exclude_patterns:
        description: Optional newline-separated exclude patterns supplied by the caller.
        required: false
        type: string
        default: ""
      report_label:
        description: Optional caller-provided target/environment label for the report summary.
        required: false
        type: string
        default: ""
      artifact_retention_days:
        description: Number of days to retain sanitized report artifacts.
        required: false
        type: number
        default: 7
    secrets:
      ssh_private_key:
        description: SSH private key with write-capable deploy access.
        required: true
      known_hosts:
        description: Known hosts content for strict host verification.
        required: true
      remote_host:
        description: Remote host.
        required: true
      remote_user:
        description: Remote user.
        required: true
      remote_target_dir:
        description: Optional remote target directory supplied as a secret by the caller repository.
        required: false
      ssh_port:
        description: Optional SSH port supplied as a secret by the caller repository.
        required: false
      ssh_passphrase:
        description: Optional passphrase for an encrypted SSH private key.
        required: false

permissions:
  contents: read

jobs:
  deploy:
    name: Rsync deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v6
        with:
          path: caller

      - name: Prepare deploy inputs
        id: inputs
        shell: bash
        env:
          EXCLUDE_FILE: ${{ inputs.exclude_file }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
          INPUT_REMOTE_TARGET_DIR: ${{ inputs.remote_target_dir }}
          SECRET_REMOTE_TARGET_DIR: ${{ secrets.remote_target_dir }}
          INPUT_SSH_PORT: ${{ inputs.ssh_port }}
          SECRET_SSH_PORT: ${{ secrets.ssh_port }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/rsync-deploy" "rsync-deploy-artifacts"

          extra_excludes="${RUNNER_TEMP}/rsync-deploy/extra-excludes.txt"
          printf '%s\n' "${EXCLUDE_PATTERNS}" > "${extra_excludes}"
          echo "extra_excludes=${extra_excludes}" >> "${GITHUB_OUTPUT}"

          if [[ -n "${EXCLUDE_FILE}" ]]; then
            caller_excludes="caller/${EXCLUDE_FILE}"
            if [[ ! -f "${caller_excludes}" ]]; then
              echo "Configured exclude_file was not found in the caller repository." >&2
              exit 1
            fi
            echo "caller_excludes=${caller_excludes}" >> "${GITHUB_OUTPUT}"
          else
            echo "caller_excludes=" >> "${GITHUB_OUTPUT}"
          fi

          remote_target_dir="${INPUT_REMOTE_TARGET_DIR:-${SECRET_REMOTE_TARGET_DIR:-}}"
          if [[ -z "${remote_target_dir}" ]]; then
            echo "remote_target_dir is required via input or secret." >&2
            exit 1
          fi
          echo "remote_target_dir=${remote_target_dir}" >> "${GITHUB_OUTPUT}"

          ssh_port="${SECRET_SSH_PORT:-${INPUT_SSH_PORT:-22}}"
          echo "ssh_port=${ssh_port}" >> "${GITHUB_OUTPUT}"

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
          SSH_PASSPHRASE: ${{ secrets.ssh_passphrase }}
          KNOWN_HOSTS: ${{ secrets.known_hosts }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          if [[ -n "${SSH_PASSPHRASE}" ]]; then
            eval "$(ssh-agent -s)"
            askpass="${RUNNER_TEMP}/ssh-askpass.sh"
            cat > "${askpass}" <<'ASKPASS'
          #!/usr/bin/env bash
          printf '%s\n' "${SSH_PASSPHRASE}"
          ASKPASS
            chmod 700 "${askpass}"
            DISPLAY=:0 SSH_ASKPASS="${askpass}" SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_key </dev/null
          fi

      - name: Preflight remote target
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.remote_host }}
          REMOTE_USER: ${{ secrets.remote_user }}
          REMOTE_TARGET_DIR: ${{ steps.inputs.outputs.remote_target_dir }}
          SSH_PORT: ${{ steps.inputs.outputs.ssh_port }}
        run: |
          set -euo pipefail
          remote_target_dir="$(printf '%q' "${REMOTE_TARGET_DIR%/}")"
          ssh_cmd=(
            ssh
            -i ~/.ssh/deploy_key
            -p "${SSH_PORT}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )

          "${ssh_cmd[@]}" "${REMOTE_USER}@${REMOTE_HOST}" "target_dir=${remote_target_dir} bash -s" <<'REMOTE'
          set -euo pipefail

          if [ -z "$target_dir" ] || [ "$target_dir" = "/" ]; then
            echo "Invalid rsync target directory." >&2
            exit 1
          fi

          if [ ! -d "$target_dir" ]; then
            echo "Rsync target directory does not exist." >&2
            exit 1
          fi

          cd "$target_dir"
          top_level_count="$(find . -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')"
          if [ "$top_level_count" -eq 0 ]; then
            echo "Rsync target directory is empty; refusing first real upload." >&2
            exit 1
          fi

          printf 'Remote target preflight passed: directory exists and contains %s top-level item(s).\n' "$top_level_count"
          REMOTE

      - name: Run rsync deploy
        shell: bash
        env:
          SOURCE_PATH: ${{ inputs.source_path }}
          REMOTE_HOST: ${{ secrets.remote_host }}
          REMOTE_USER: ${{ secrets.remote_user }}
          REMOTE_TARGET_DIR: ${{ steps.inputs.outputs.remote_target_dir }}
          SSH_PORT: ${{ steps.inputs.outputs.ssh_port }}
          CALLER_EXCLUDES: ${{ steps.inputs.outputs.caller_excludes }}
          EXTRA_EXCLUDES: ${{ steps.inputs.outputs.extra_excludes }}
        run: |
          set -euo pipefail
          if [[ ! -d "caller/${SOURCE_PATH}" ]]; then
            echo "Configured source_path is not a directory." >&2
            exit 1
          fi

          args=(
            --archive
            --compress
            --checksum
            --no-times
            --omit-dir-times
            --human-readable
            --itemize-changes
            --stats
            --out-format=%i\ %n%L
            --exclude-from "${EXTRA_EXCLUDES}"
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          )

          if [[ -n "${CALLER_EXCLUDES}" ]]; then
            args+=(--exclude-from "${CALLER_EXCLUDES}")
          fi

          rsync "${args[@]}" "caller/${SOURCE_PATH}/" "${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_TARGET_DIR%/}/" \
            | tee "${RUNNER_TEMP}/rsync-deploy/output.log"

      - name: Write deploy report
        shell: bash
        env:
          REPORT_LABEL: ${{ inputs.report_label }}
        run: |
          set -euo pipefail
          report="rsync-deploy-artifacts/rsync-deploy-output-first-300-lines.txt"
          sed -n '1,300p' "${RUNNER_TEMP}/rsync-deploy/output.log" > "${report}"

          {
            echo "# Rsync Deploy Report"
            echo
            if [[ -n "${REPORT_LABEL}" ]]; then
              echo "- target: \`${REPORT_LABEL}\`"
            fi
            echo "- mode: \`deploy\`"
            echo "- delete behavior: \`disabled\`"
            echo
            echo "This was a real rsync upload. It did not pass \`--delete\`, so remote files absent from this repository were left in place."
            echo
            echo "## First 300 output lines"
            echo
            echo '```text'
            sed -n '1,300p' "${RUNNER_TEMP}/rsync-deploy/output.log"
            echo '```'
            echo
            echo "Artifact uploaded: \`rsync-deploy-output-first-300-lines.txt\`."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload deploy report
        uses: actions/upload-artifact@v6
        with:
          name: rsync-deploy-report
          path: rsync-deploy-artifacts/rsync-deploy-output-first-300-lines.txt
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
